name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE:   1
  PYO3_PYTHON_VERSION: 3.12

jobs:
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install Python deps (pyfixest, polars, statsmodels)
        run: uv sync

      - name: Set Python version for PyO3
        run: |
          echo "PYO3_PYTHON_VERSION=3.12" >> $GITHUB_ENV
          echo "PYTHONPATH=$(uv python path)" >> $GITHUB_ENV

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace --all-targets

      - name: cargo-audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit

  bench-check:
    name: Benchmarks compile check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --benches --workspace

  publish-dry-run:
    name: Publish dry run
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cargo publish --dry-run -p awald-data
          cargo publish --dry-run -p awald-engine
          cargo publish --dry-run -p awald-session
